name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:

concurrency:
  # Concurrency group that uses the workflow name and PR number if available
  # or commit SHA as a fallback. If a new build is triggered under that
  # concurrency group while a previous build is running it will be canceled.
  # Repeated pushes to a PR will cancel all previous builds, while multiple
  # merges to main will not cancel.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions: {}

jobs:
  build:
    name: Build recipe with ${{ matrix.compiler }} for ${{ matrix.target_platform }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # GCC stack on Windows is only available for win-64
          - compiler: gcc
            target_platform: win-64

          # conda-forge maintain doesn't really maintain a win-32 stack for MSVC anymore
          - compiler: vs
            target_platform: win-64
          - compiler: vs
            target_platform: win-arm64

          - compiler: zig
            target_platform: win-32
          - compiler: zig
            target_platform: win-64
          - compiler: zig
            target_platform: win-arm64
    env:
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Checkout Source
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@82d477f15f3a381dbcc8adc1206ce643fe110fb7 # v0.9.3
        with:
          cache: true

      - name: Pixi info
        shell: pwsh
        run: |
          pixi info
          pixi list

      - name: Find and Add RC.exe to PATH
        shell: pwsh
        run: |
          # Find the path dynamically
          $vsPath = vswhere -latest -property installationPath
          $sdkBase = "C:\Program Files (x86)\Windows Kits\10\bin"
          $latestVersion = Get-ChildItem -Path $sdkBase | Where-Object { $_.Name -match '^10\.' } | Sort-Object Name -Descending | Select-Object -First 1
          $rcDir = Join-Path $sdkBase "$($latestVersion.Name)\x64"

          # Add to GitHub PATH
          if (Test-Path $rcDir) {
              echo "$rcDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
              Write-Host "Successfully added $rcDir to GITHUB_PATH"
          } else {
              Write-Error "Could not find SDK directory"
              exit 1
          }

      - name: Verify RC is available
        shell: pwsh
        run: rc /?

      - name: Run Build
        shell: pwsh
        run: |
          pixi run rattler-build build `
          --recipe recipe `
          --ignore-recipe-variants `
          --variant-config recipe\variants\${{ matrix.compiler }}.yaml `
          --target-platform ${{ matrix.target_platform }} `
          --log-style plain `
          --skip-existing all `
          --channel conda-forge `
          --extra-meta flow_run_id="github_$GITHUB_RUN_ID" `
          --extra-meta remote_url="https://github.com/$GITHUB_REPOSITORY" `
          --extra-meta sha="$GITHUB_SHA"

      - uses: fawazahmed0/action-debug-vscode@main
        if: failure()
        timeout-minutes: 60
        with:
          token: ${{ secrets.DEBUG_TOKEN }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: conda-launchers-builds
          path: |
            ./output/${{ matrix.target_platform }}/conda-launchers*.conda

      - name: Upload to Anaconda
        if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'release'
        env:
          ANACONDA_OWNER: conda-canary
          ANACONDA_CHANNEL: conda-launchers_dev
          ANACONDA_API_KEY: ${{ secrets.ANACONDA_ORG_CONDA_CANARY_TOKEN }}
        shell: pwsh
        run: |
          if (-not $env:ANACONDA_API_KEY -or $env:ANACONDA_API_KEY -eq '') {
            Write-Error "ANACONDA_API_KEY is not set."
            exit 1
          }
          foreach ($file in Get-ChildItem -Path "./output/${{ matrix.target_platform }}/conda-launchers*.conda") {
            Write-Host "Uploading $($file.Name)"
            pixi run rattler-build upload anaconda --log-style plain "$file"
          }
